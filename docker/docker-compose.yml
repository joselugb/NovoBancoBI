version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: banking_postgres
    environment:
      POSTGRES_DB: bankingdb
      POSTGRES_USER: banking_user
      POSTGRES_PASSWORD: banking_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
